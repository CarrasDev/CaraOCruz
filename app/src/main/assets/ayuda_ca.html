<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #1565C0; /* AZUL para todas las letras */
            background-color: #f0f4f8; /* Un fondo azulado muy leve para armonizar */
            padding: 15px;
            margin: 0;
        }
        h1 {
            color: #0D47A1; /* Azul más oscuro para el título principal */
            text-align: center;
            font-size: 26px;
            text-transform: uppercase;
            border-bottom: 2px solid #FFC107; /* Línea amarilla bajo el título */
            padding-bottom: 10px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-left: 8px solid #FFC107; /* BORDE AMARILLO grueso a la izquierda */
        }
        h3 {
            margin-top: 0;
            color: #1976D2; /* Azul para los subtítulos */
        }
        p { margin-bottom: 0; }
    </style>
</head>
<body>
<h1>Centre d'Ajuda</h1>
<div class="card">
    <h3>Com jugar?</h3>
    <p>Introdueix la teva aposta i selecciona cara o creu. Si encertes, el teu saldo pujarà!</p>
</div>
<div class="card">
    <h3>Fallida</h3>
    <p>Si et quedes sense monedes, la pantalla de Game Over et permetrà reiniciar amb 100 monedes de cortesia.</p>
</div>
</body>
<html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.6;
        color: #1565C0; /* AZUL para todas las letras */
        background-color: #f0f4f8; /* Un fondo azulado muy leve para armonizar */
        padding: 15px;
        margin: 0;
    }
    h1 {
        color: #0D47A1; /* Azul más oscuro para el título principal */
        text-align: center;
        font-size: 26px;
        text-transform: uppercase;
        border-bottom: 2px solid #FFC107; /* Línea amarilla bajo el título */
        padding-bottom: 10px;
    }
    .card {
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 15px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        border-left: 8px solid #FFC107; /* BORDE AMARILLO grueso a la izquierda */
    }
    h3 {
        margin-top: 0;
        color: #1976D2; /* Azul para los subtítulos */
    }
    p { margin-bottom: 0; }
    </style>
</head>
<body>
<h1>Help Center</h1>
<div class="card">
    <h3>How to play?</h3>
    <p>Enter your bet and select heads or tails. If you win, your balance will increase!</p>
</div>
<div class="card">
    <h3>Bankruptcy</h3>
    <p>If you run out of coins, the Game Over screen will let you restart with 100 courtesy coins.</p>
</div>
</body>
<html>
